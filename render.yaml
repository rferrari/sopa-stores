# Render Blueprint for the sopa-store monorepo (turborepo, npm workspaces).
# Backend lives at apps/backend and builds into apps/backend/.medusa/server.
# Root Directory is the repo root (.) so npm workspaces resolve correctly.
#
# Free-tier setup: ONE web service in "shared" mode (HTTP + background jobs in
# one process). No separate worker, no Redis. Add those when you upgrade.

services:
  - type: web
    name: sopa-store-server
    runtime: node
    plan: free
    region: frankfurt                 # match your Supabase region
    branch: main
    # The .medusa/server output has no .npmrc, so its install uses strict peer
    # resolution and fails on @medusajs/ui — force legacy-peer-deps here.
    buildCommand: npm ci && npm run build && cd apps/backend/.medusa/server && npm install --legacy-peer-deps
    # Free tier has no pre-deploy command, so run migrations at start.
    # Migrations are idempotent — already-applied ones are skipped.
    startCommand: cd apps/backend/.medusa/server && npx medusa db:migrate && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MEDUSA_WORKER_MODE
        value: shared
      - key: DISABLE_MEDUSA_ADMIN
        value: "false"
      - key: PORT
        value: "9000"
      - key: DATABASE_URL             # Supabase connection string (set in UI)
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: ADMIN_CORS               # e.g. https://sopa-store-server.onrender.com
        sync: false
      - key: AUTH_CORS                # same as ADMIN_CORS (+ storefront URL later)
        sync: false
